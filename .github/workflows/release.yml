name: Boot Assets Release

on:
  push:
    tags:
      - "v*"
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      kernel_tag:
        description: "arcboxlabs/kernel release tag to download (e.g. v0.1.0)"
        required: true
        type: string
  repository_dispatch:
    types: [kernel-release]

permissions:
  contents: write

jobs:
  # ==========================================================================
  # Stage 0: Resolve version and kernel tag.
  # ==========================================================================
  resolve-vars:
    name: Resolve Build Variables
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.vars.outputs.version }}
      kernel_tag: ${{ steps.vars.outputs.kernel_tag }}

    steps:
      - name: Resolve build variables
        id: vars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Version: manual input > tag > auto-increment from latest release
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Auto-increment patch version from latest release.
            LATEST=$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName' 2>/dev/null || echo "v0.0.0")
            LATEST="${LATEST#v}"
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          else
            VERSION="0.0.0-dev.${GITHUB_SHA::7}"
          fi

          # Kernel tag: manual input > dispatch payload > latest
          KERNEL_TAG="${{ github.event.inputs.kernel_tag }}"
          if [ -z "$KERNEL_TAG" ] && [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            KERNEL_TAG="${{ github.event.client_payload.kernel_tag }}"
          fi
          if [ -z "$KERNEL_TAG" ]; then
            KERNEL_TAG="latest"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "kernel_tag=$KERNEL_TAG" >> "$GITHUB_OUTPUT"

          echo "=== Resolved ==="
          echo "  version:    $VERSION"
          echo "  kernel_tag: $KERNEL_TAG"

  # ==========================================================================
  # Stage 1a: Download pre-built kernel from arcboxlabs/kernel release.
  # ==========================================================================
  download-kernel:
    name: Download Kernel (${{ matrix.arch }})
    needs: resolve-vars
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - name: Download kernel from arcboxlabs/kernel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KERNEL_TAG="${{ needs.resolve-vars.outputs.kernel_tag }}"
          mkdir -p staging

          if [ "$KERNEL_TAG" = "latest" ]; then
            echo "==> Downloading latest kernel release"
            gh release download --repo arcboxlabs/kernel \
              --pattern "kernel-${{ matrix.arch }}" --dir staging/
          else
            echo "==> Downloading kernel from tag: $KERNEL_TAG"
            gh release download "$KERNEL_TAG" --repo arcboxlabs/kernel \
              --pattern "kernel-${{ matrix.arch }}" --dir staging/
          fi

          ls -lh staging/

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v7
        with:
          name: kernel-${{ matrix.arch }}
          path: staging/kernel-${{ matrix.arch }}
          retention-days: 1

  # ==========================================================================
  # Stage 1b: Build EROFS rootfs (native arch runner).
  # ==========================================================================
  build-rootfs:
    name: Build EROFS Rootfs (${{ matrix.arch }})
    needs: resolve-vars
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install erofs-utils
        run: sudo apt-get update && sudo apt-get install -y erofs-utils

      - name: Build CLI
        run: cargo build --release --features build --no-default-features

      - name: Build EROFS rootfs
        run: |
          ./target/release/boot-assets build-rootfs \
            --output "$PWD/build/rootfs.erofs" \
            --arch ${{ matrix.arch }}

      - name: Upload rootfs.erofs
        uses: actions/upload-artifact@v7
        with:
          name: rootfs-erofs-${{ matrix.arch }}
          path: build/rootfs.erofs
          retention-days: 1

  # ==========================================================================
  # Stage 2: Assemble per-arch tarball + single-target manifest.
  # ==========================================================================
  assemble:
    name: Assemble (${{ matrix.arch }})
    needs: [resolve-vars, download-kernel, build-rootfs]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-x86_64-cargo-

      - name: Build CLI
        run: cargo build --release --features build --no-default-features

      - name: Download kernel
        uses: actions/download-artifact@v8
        with:
          name: kernel-${{ matrix.arch }}
          path: staging

      - name: Download rootfs.erofs
        uses: actions/download-artifact@v8
        with:
          name: rootfs-erofs-${{ matrix.arch }}
          path: staging

      - name: Sync runtime binaries
        run: |
          ./target/release/boot-assets sync-binaries \
            --arch ${{ matrix.arch }} \
            --binaries-json "$PWD/dist/binaries.json"

      - name: Assemble release
        run: |
          ./target/release/boot-assets build-release \
            --version "${{ needs.resolve-vars.outputs.version }}" \
            --kernel "$PWD/staging/kernel-${{ matrix.arch }}" \
            --rootfs "$PWD/staging/rootfs.erofs" \
            --arch ${{ matrix.arch }} \
            --kernel-version "${{ needs.resolve-vars.outputs.kernel_tag }}" \
            --source-repo "arcboxlabs/kernel" \
            --source-ref "${{ needs.resolve-vars.outputs.kernel_tag }}" \
            --output-dir "$PWD/dist" \
            --binaries-json "$PWD/dist/binaries.json"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: boot-assets-release-${{ matrix.arch }}
          path: dist/
          retention-days: 14

  # ==========================================================================
  # Stage 3: Merge per-arch manifests into unified manifest.
  # ==========================================================================
  merge-manifest:
    name: Merge Manifests
    needs: [resolve-vars, assemble]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-x86_64-cargo-

      - name: Build CLI
        run: cargo build --release --features build --no-default-features

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: boot-assets-release-arm64
          path: dist/arm64

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: boot-assets-release-x86_64
          path: dist/x86_64

      - name: Merge manifests
        run: |
          ./target/release/boot-assets merge-manifest \
            dist/arm64/manifest.json \
            dist/x86_64/manifest.json \
            --output dist/manifest.json

          echo "=== Merged manifest ==="
          cat dist/manifest.json

      - name: Upload merged manifest
        uses: actions/upload-artifact@v7
        with:
          name: manifest-merged
          path: dist/manifest.json
          retention-days: 14

  # ==========================================================================
  # Stage 4: GitHub Release (tag pushes only).
  # ==========================================================================
  release:
    name: GitHub Release
    needs: [resolve-vars, assemble, merge-manifest]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'repository_dispatch'

    steps:
      - name: Download arm64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: boot-assets-release-arm64
          path: dist

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: boot-assets-release-x86_64
          path: dist

      - name: Download merged manifest
        uses: actions/download-artifact@v8
        with:
          name: manifest-merged
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-vars.outputs.version }}
          name: Boot Assets v${{ needs.resolve-vars.outputs.version }}
          body: |
            ## Boot Assets v${{ needs.resolve-vars.outputs.version }}

            Schema version 7 — multi-target manifest, kernel + EROFS rootfs.

            ### Files
            - `boot-assets-arm64-v${{ needs.resolve-vars.outputs.version }}.tar.gz` (+ `.sha256`)
            - `boot-assets-x86_64-v${{ needs.resolve-vars.outputs.version }}.tar.gz` (+ `.sha256`)
            - `manifest.json` — unified multi-target manifest
          files: |
            dist/boot-assets-arm64-v${{ needs.resolve-vars.outputs.version }}.tar.gz
            dist/boot-assets-arm64-v${{ needs.resolve-vars.outputs.version }}.tar.gz.sha256
            dist/boot-assets-x86_64-v${{ needs.resolve-vars.outputs.version }}.tar.gz
            dist/boot-assets-x86_64-v${{ needs.resolve-vars.outputs.version }}.tar.gz.sha256
            dist/manifest.json
          draft: false
          prerelease: ${{ contains(needs.resolve-vars.outputs.version, 'alpha') || contains(needs.resolve-vars.outputs.version, 'beta') }}

  # ==========================================================================
  # Stage 5: Upload boot assets to Backblaze B2.
  #
  # CDN layout (boot.arcboxcdn.com):
  #   ├── latest.json                     # {"version":"x.y.z"}
  #   ├── asset/
  #   │   └── v0.2.3/
  #   │       ├── manifest.json           # unified manifest
  #   │       ├── arm64/kernel
  #   │       ├── arm64/rootfs.erofs
  #   │       ├── x86_64/kernel
  #   │       └── x86_64/rootfs.erofs
  #   └── bin/                            # managed by sync-binaries.yml
  #       └── {name}/{version}/{arch}/{name}
  # ==========================================================================
  upload-b2:
    name: Upload to B2
    needs: [resolve-vars, assemble, merge-manifest]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'repository_dispatch'

    steps:
      - name: Download arm64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: boot-assets-release-arm64
          path: dist/arm64

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: boot-assets-release-x86_64
          path: dist/x86_64

      - name: Download merged manifest
        uses: actions/download-artifact@v8
        with:
          name: manifest-merged
          path: dist

      - name: Prepare upload directory structure
        run: |
          VERSION="${{ needs.resolve-vars.outputs.version }}"
          STAGING="b2-staging"

          # asset/v{version}/{arch}/kernel + rootfs.erofs
          for ARCH in arm64 x86_64; do
            mkdir -p "$STAGING/asset/v${VERSION}/${ARCH}"
            TARBALL="dist/${ARCH}/boot-assets-${ARCH}-v${VERSION}.tar.gz"
            tar -xzf "$TARBALL" -C "$STAGING/asset/v${VERSION}/${ARCH}/" kernel rootfs.erofs
          done
          cp dist/manifest.json "$STAGING/asset/v${VERSION}/manifest.json"

          # latest.json
          printf '{"version":"%s"}\n' "$VERSION" > "$STAGING/latest.json"

          echo "=== B2 staging ==="
          find "$STAGING" -type f | sort

      - name: Upload to Backblaze B2
        run: |
          aws s3 sync b2-staging/ "s3://${{ secrets.B2_BUCKET }}/" \
            --endpoint-url "https://s3.${{ secrets.B2_REGION }}.backblazeb2.com" \
            --size-only

          # Force-upload latest.json (size-only skips it when only the
          # version string changes but the file size stays the same).
          aws s3 cp b2-staging/latest.json "s3://${{ secrets.B2_BUCKET }}/latest.json" \
            --endpoint-url "https://s3.${{ secrets.B2_REGION }}.backblazeb2.com"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.B2_REGION }}

      - name: Verify CDN
        run: |
          VERSION="${{ needs.resolve-vars.outputs.version }}"
          sleep 5
          for URL in \
            "https://boot.arcboxcdn.com/asset/v${VERSION}/manifest.json" \
            "https://boot.arcboxcdn.com/asset/v${VERSION}/arm64/kernel" \
            "https://boot.arcboxcdn.com/latest.json"; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
            echo "CDN check: $URL -> HTTP $HTTP_STATUS"
            if [ "$HTTP_STATUS" != "200" ]; then
              echo "::warning::CDN returned HTTP $HTTP_STATUS for $URL"
            fi
          done
