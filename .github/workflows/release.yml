name: Boot Assets Release

on:
  push:
    tags:
      - "v*"
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string
      kernel_tag:
        description: "arcbox-labs/kernel release tag to download (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ==========================================================================
  # Stage 0: Resolve version and kernel tag.
  # ==========================================================================
  resolve-vars:
    name: Resolve Build Variables
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.vars.outputs.version }}
      kernel_tag: ${{ steps.vars.outputs.kernel_tag }}

    steps:
      - name: Resolve build variables
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            # Branch push (master): use short SHA as dev version.
            VERSION="0.0.0-dev.${GITHUB_SHA::7}"
          fi

          KERNEL_TAG="${{ github.event.inputs.kernel_tag }}"
          if [ -z "$KERNEL_TAG" ]; then
            # Tag push: default to latest kernel release.
            KERNEL_TAG="latest"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "kernel_tag=$KERNEL_TAG" >> "$GITHUB_OUTPUT"

          echo "=== Resolved ==="
          echo "  version:    $VERSION"
          echo "  kernel_tag: $KERNEL_TAG"

  # ==========================================================================
  # Stage 1a: Download pre-built kernel from arcbox-labs/kernel release.
  # ==========================================================================
  download-kernel:
    name: Download Kernel
    needs: resolve-vars
    runs-on: ubuntu-latest

    steps:
      - name: Download kernel from arcbox-labs/kernel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KERNEL_TAG="${{ needs.resolve-vars.outputs.kernel_tag }}"
          mkdir -p staging

          if [ "$KERNEL_TAG" = "latest" ]; then
            echo "==> Downloading latest kernel release"
            gh release download --repo arcbox-labs/kernel \
              --pattern "kernel-arm64" --dir staging/
          else
            echo "==> Downloading kernel from tag: $KERNEL_TAG"
            gh release download "$KERNEL_TAG" --repo arcbox-labs/kernel \
              --pattern "kernel-arm64" --dir staging/
          fi

          ls -lh staging/
          echo "==> Kernel downloaded"

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-arm64
          path: staging/kernel-arm64
          retention-days: 1

  # ==========================================================================
  # Stage 1b: Build EROFS rootfs (needs Docker for Alpine container +
  # mkfs.erofs for image creation).
  # ==========================================================================
  build-rootfs:
    name: Build EROFS Rootfs
    needs: resolve-vars
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout boot-assets
        uses: actions/checkout@v4

      - name: Install erofs-utils
        run: sudo apt-get update && sudo apt-get install -y erofs-utils

      - name: Build EROFS rootfs
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-erofs-rootfs.sh \
            --output "$PWD/build/rootfs.erofs" \
            --arch arm64

      - name: Upload rootfs.erofs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-erofs
          path: build/rootfs.erofs
          retention-days: 1

  # ==========================================================================
  # Stage 2: Assemble tarball (kernel + rootfs.erofs + manifest.json).
  # ==========================================================================
  build:
    name: Assemble Boot Assets
    needs: [resolve-vars, download-kernel, build-rootfs]
    runs-on: ubuntu-latest

    outputs:
      version: ${{ needs.resolve-vars.outputs.version }}
      tarball: ${{ steps.assemble.outputs.tarball }}

    steps:
      - name: Checkout boot-assets
        uses: actions/checkout@v4

      - name: Download kernel
        uses: actions/download-artifact@v4
        with:
          name: kernel-arm64
          path: staging

      - name: Download rootfs.erofs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-erofs
          path: staging

      - name: Assemble release
        id: assemble
        env:
          KERNEL_VERSION: ${{ needs.resolve-vars.outputs.kernel_tag }}
        run: |
          chmod +x scripts/*.sh

          ./scripts/build-release.sh \
            --version "${{ needs.resolve-vars.outputs.version }}" \
            --kernel "$PWD/staging/kernel-arm64" \
            --rootfs "$PWD/staging/rootfs.erofs" \
            --arch arm64 \
            --kernel-version "${{ needs.resolve-vars.outputs.kernel_tag }}" \
            --source-repo "arcbox-labs/kernel" \
            --source-ref "${{ needs.resolve-vars.outputs.kernel_tag }}" \
            --output-dir "$PWD/dist"

          TARBALL="boot-assets-arm64-v${{ needs.resolve-vars.outputs.version }}.tar.gz"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boot-assets-release
          path: |
            dist/${{ steps.assemble.outputs.tarball }}
            dist/${{ steps.assemble.outputs.tarball }}.sha256
            dist/manifest.json
          retention-days: 14

  # ==========================================================================
  # Create GitHub Release (tag pushes only).
  # ==========================================================================
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: boot-assets-release
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Boot Assets v${{ needs.build.outputs.version }}
          body: |
            ## Boot Assets v${{ needs.build.outputs.version }}

            Schema version 6 — kernel + EROFS rootfs only.

            ### Files
            - `${{ needs.build.outputs.tarball }}`
            - `${{ needs.build.outputs.tarball }}.sha256`
            - `manifest.json`
          files: |
            dist/${{ needs.build.outputs.tarball }}
            dist/${{ needs.build.outputs.tarball }}.sha256
            dist/manifest.json
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, 'alpha') || contains(needs.build.outputs.version, 'beta') }}

  # ==========================================================================
  # Upload to Cloudflare R2 (CDN: dl.arcbox.dev).
  # ==========================================================================
  upload-r2:
    name: Upload to R2
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: boot-assets-release
          path: dist

      - name: Prepare R2 directory structure
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TARBALL="${{ needs.build.outputs.tarball }}"

          mkdir -p "r2-staging/v${VERSION}"
          cp "dist/${TARBALL}" "r2-staging/v${VERSION}/"
          cp "dist/${TARBALL}.sha256" "r2-staging/v${VERSION}/"
          cp "dist/manifest.json" "r2-staging/v${VERSION}/"

          printf '{"version":"%s","arm64":{"bundle":"%s"}}\n' \
            "$VERSION" "$TARBALL" \
            | python3 -m json.tool > "r2-staging/latest.json"

          echo "=== R2 staging ==="
          find r2-staging -type f

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: r2-staging
          destination-dir: boot-assets

      - name: Verify CDN
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TARBALL="${{ needs.build.outputs.tarball }}"
          URL="https://dl.arcbox.dev/boot-assets/v${VERSION}/${TARBALL}.sha256"

          sleep 3
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
          echo "CDN check: $URL -> HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::CDN returned HTTP $HTTP_STATUS (may need DNS propagation)"
          fi
