name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Rust + Linux E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-ci-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-ci-cargo-

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Unit tests
        run: cargo test --all-features --lib --bins

      - name: Build CLI
        run: cargo build --features build --no-default-features

      - name: Linux E2E smoke
        run: cargo test --features build --no-default-features --test e2e -- --nocapture
